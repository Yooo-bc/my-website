<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>后台管理 — 个人主页</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #27303b;
      background: #c7cbd1;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,.22);
      pointer-events: none;
      z-index: 0;
    }

    /* ====== 登录 ====== */
    .login-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(30,36,48,.55);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      transition: opacity .55s cubic-bezier(.16,1,.3,1), visibility .55s;
    }
    .login-overlay.hidden { opacity: 0; pointer-events: none; visibility: hidden; }
    .login-card {
      position: relative;
      overflow: hidden;
      width: min(420px, 90vw);
      padding: 48px 36px 40px;
      border: 1px solid rgba(255,255,255,.62);
      border-radius: 34px;
      background: rgba(230,233,238,.55);
      backdrop-filter: blur(24px) saturate(120%);
      -webkit-backdrop-filter: blur(24px) saturate(120%);
      box-shadow:
        0 30px 90px rgba(74,83,96,.28),
        0 0 34px rgba(55,109,255,.18),
        0 0 42px rgba(220,32,49,.12),
        inset 0 1px 0 rgba(255,255,255,.8),
        inset 0 -1px 0 rgba(255,255,255,.22);
      text-align: center;
      animation: loginIn .65s cubic-bezier(.16,1,.3,1);
    }
    @keyframes loginIn {
      from { transform: translateY(32px) scale(.92); opacity: 0; }
      to   { transform: translateY(0) scale(1); opacity: 1; }
    }
    .login-card .wolf-icon {
      display: block;
      width: 80px; height: 80px;
      margin: 0 auto 20px;
      padding: 5px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3b72ff, #dc2031);
      box-shadow: 0 0 0 1px rgba(255,255,255,.3), 0 12px 40px rgba(55,109,255,.25), 0 12px 40px rgba(220,32,49,.18);
      font-size: 40px; line-height: 70px; user-select: none;
    }
    .login-card h2 { margin: 0 0 6px; font-size: 22px; letter-spacing: .02em; color: #202833; }
    .login-card .sub { margin: 0 0 24px; font-size: 13px; color: #536072; }
    .login-card input {
      width: 100%;
      padding: 12px 16px; margin-bottom: 14px;
      border: 1px solid rgba(71,82,99,.22);
      border-radius: 14px;
      font-size: 15px; font-family: inherit;
      text-align: center; color: #27303b;
      background: rgba(255,255,255,.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: border-color .25s, box-shadow .25s;
    }
    .login-card input:focus { outline: none; border-color: #3b72ff; box-shadow: 0 0 0 3px rgba(59,114,255,.14); }
    .login-card .error { color: #dc2031; font-size: 13px; min-height: 20px; margin-bottom: 4px; }

    /* ====== 顶部栏 ====== */
    .admin-header {
      position: sticky; top: 0; z-index: 20;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 28px;
      border-bottom: 1px solid rgba(255,255,255,.5);
      background: rgba(230,233,238,.55);
      backdrop-filter: blur(20px) saturate(120%);
      -webkit-backdrop-filter: blur(20px) saturate(120%);
    }
    .admin-header h1 { font-size: 18px; margin: 0; color: #202833; letter-spacing: .02em; }
    .admin-header .actions { display: flex; gap: 10px; align-items: center; }
    .admin-header .status { font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 999px; }
    .admin-header .status.ok { background: rgba(46,160,67,.15); color: #2ea043; }
    .admin-header .status.err { background: rgba(220,32,49,.12); color: #dc2031; }

    /* ====== 按钮 ====== */
    .btn {
      padding: 8px 20px; border-radius: 12px; border: none;
      cursor: pointer; font-size: 14px; font-weight: 600; font-family: inherit;
      transition: transform .15s ease, box-shadow .2s ease, background .2s ease;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: #3b72ff; color: #fff; box-shadow: 0 4px 18px rgba(59,114,255,.32); }
    .btn-primary:hover { box-shadow: 0 6px 26px rgba(59,114,255,.48); }
    .btn-primary:disabled { background: #8899bb; box-shadow: none; cursor: not-allowed; }
    .btn-outline {
      background: rgba(255,255,255,.5); color: #27303b;
      border: 1px solid rgba(71,82,99,.18);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    }
    .btn-outline:hover { background: rgba(255,255,255,.75); }
    .btn-danger { background: #dc2031; color: #fff; box-shadow: 0 4px 16px rgba(220,32,49,.28); }
    .btn-danger:hover { box-shadow: 0 6px 22px rgba(220,32,49,.42); }
    .btn-sm { padding: 4px 12px; font-size: 12px; border-radius: 8px; }
    .btn-block { width: 100%; }

    /* ====== 容器 ====== */
    .container { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 28px 20px 80px; }

    /* ====== 分区卡片 ====== */
    .section {
      position: relative; overflow: hidden;
      border: 1px solid rgba(255,255,255,.6);
      border-radius: 28px;
      background: rgba(230,233,238,.5);
      backdrop-filter: blur(18px) saturate(120%);
      -webkit-backdrop-filter: blur(18px) saturate(120%);
      box-shadow:
        0 20px 60px rgba(74,83,96,.16),
        0 0 16px rgba(55,109,255,.08),
        0 0 20px rgba(220,32,49,.06),
        inset 0 1px 0 rgba(255,255,255,.7);
      padding: 28px; margin-bottom: 20px;
      transition: box-shadow .35s ease;
    }
    .section:hover {
      box-shadow:
        0 24px 68px rgba(74,83,96,.22),
        0 0 22px rgba(55,109,255,.13),
        0 0 28px rgba(220,32,49,.09),
        inset 0 1px 0 rgba(255,255,255,.8);
    }
    .section h2 { margin: 0 0 18px; font-size: 20px; color: #202833; display: flex; align-items: center; gap: 8px; letter-spacing: .02em; }
    .section h2 .icon { font-size: 22px; }

    /* ====== 头像上传组件 ====== */
    .avatar-upload {
      display: flex; align-items: center; gap: 14px;
    }
    .avatar-upload-preview {
      width: 72px; height: 72px; border-radius: 50%;
      object-fit: cover; flex-shrink: 0;
      border: 3px solid #fff;
      box-shadow: 0 0 0 2px rgba(59,114,255,.35), 0 8px 24px rgba(74,83,96,.22);
      transition: transform .2s, box-shadow .2s;
      cursor: pointer;
    }
    .avatar-upload-preview:hover { transform: scale(1.06); }
    .avatar-upload-preview[src=""], .avatar-upload-preview:not([src]) { opacity: 0; }
    .avatar-upload-actions {
      display: flex; flex-direction: column; gap: 6px; min-width: 0;
    }
    .avatar-upload-actions input {
      font-size: 12px; padding: 6px 10px;
      border: 1px solid rgba(71,82,99,.2);
      border-radius: 8px; background: rgba(255,255,255,.6);
    }

    /* ====== 缩略图选择器 ====== */
    .thumb-picker {
      display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px;
    }
    .thumb-picker img {
      width: 48px; height: 48px; object-fit: cover;
      border-radius: 8px; border: 2px solid transparent;
      cursor: pointer; transition: border-color .2s, transform .15s;
    }
    .thumb-picker img:hover { border-color: #3b72ff; transform: scale(1.1); }
    .thumb-picker img.active { border-color: #3b72ff; box-shadow: 0 0 0 2px rgba(59,114,255,.3); }

    /* ====== 表单字段 ====== */
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 13px; font-weight: 600; color: #536072; margin-bottom: 5px; }
    .field input, .field textarea, .field select {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid rgba(71,82,99,.2);
      border-radius: 12px;
      font-size: 14px; font-family: inherit; color: #27303b;
      background: rgba(255,255,255,.6);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      transition: border-color .2s, box-shadow .2s;
    }
    .field input:focus, .field textarea:focus, .field select:focus {
      outline: none; border-color: #3b72ff; box-shadow: 0 0 0 3px rgba(59,114,255,.12);
    }
    .field textarea { min-height: 80px; resize: vertical; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .field-hint { font-size: 11px; color: #8899aa; margin-top: 4px; }

    /* ====== 标签 ====== */
    .tag-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
    .tag-item {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px; border-radius: 999px;
      border: 1px solid rgba(71,82,99,.18);
      background: rgba(255,255,255,.55);
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      font-size: 13px;
    }
    .tag-item.red { border-color: rgba(220,32,49,.48); background: rgba(220,32,49,.14); }
    .tag-item.blue { border-color: rgba(55,109,255,.5); background: rgba(55,109,255,.15); }
    .tag-item button {
      background: none; border: none; cursor: pointer;
      color: #889; font-size: 15px; padding: 0 2px; line-height: 1;
      transition: color .15s;
    }
    .tag-item button:hover { color: #dc2031; }

    /* ====== 稿件列表 ====== */
    .artwork-list { display: flex; flex-direction: column; gap: 12px; }
    .artwork-item {
      display: flex; align-items: center; gap: 14px;
      padding: 14px;
      border: 1px solid rgba(71,82,99,.14);
      border-radius: 14px;
      background: rgba(255,255,255,.5);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      transition: box-shadow .2s;
    }
    .artwork-item:hover { box-shadow: 0 4px 20px rgba(55,109,255,.1), 0 2px 10px rgba(220,32,49,.06); }
    .artwork-item img { width: 80px; height: 80px; object-fit: cover; border-radius: 10px; cursor: pointer; transition: transform .15s; }
    .artwork-item img:hover { transform: scale(1.05); }
    .artwork-item .info { flex: 1; min-width: 0; }
    .artwork-item .info input { width: 100%; }
    .artwork-item .actions { display: flex; gap: 6px; }

    /* ====== 上传区 ====== */
    .upload-zone {
      border: 2px dashed rgba(59,114,255,.28);
      border-radius: 16px; padding: 28px;
      text-align: center; cursor: pointer;
      background: rgba(255,255,255,.35);
      transition: border-color .2s, background .2s;
    }
    .upload-zone:hover, .upload-zone.drag-over { border-color: #3b72ff; background: rgba(59,114,255,.06); }
    .upload-zone input[type=file] { display: none; }
    .upload-zone .label { color: #3b72ff; font-weight: 600; font-size: 14px; }
    .upload-zone .hint { color: #889; font-size: 12px; margin-top: 4px; }
    .preview-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
    .preview-row .thumb {
      width: 72px; height: 72px; object-fit: cover;
      border-radius: 10px; border: 2px solid transparent;
      cursor: pointer; transition: border-color .2s, transform .15s;
    }
    .preview-row .thumb:hover { border-color: #3b72ff; transform: scale(1.08); }

    /* ====== Toast ====== */
    .toast {
      position: fixed; bottom: 28px; right: 28px; z-index: 200;
      padding: 12px 24px; border-radius: 14px;
      color: #fff; font-weight: 600; font-size: 14px;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      transform: translateY(80px); opacity: 0;
      transition: transform .4s cubic-bezier(.16,1,.3,1), opacity .3s ease;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: rgba(46,160,67,.85); }
    .toast.error { background: rgba(220,32,49,.85); }

    @media (max-width: 700px) {
      .admin-header { padding: 10px 16px; }
      .admin-header h1 { font-size: 15px; }
      .field-row { grid-template-columns: 1fr; }
      .section { padding: 20px; border-radius: 22px; }
      .login-card { padding: 36px 24px 32px; border-radius: 26px; }
      .avatar-upload { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <!-- ========== 登录遮罩 ========== -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-card">
      <div class="wolf-icon">🐺</div>
      <h2>后台管理</h2>
      <p class="sub">请输入管理密码以继续</p>
      <input type="password" id="passwordInput" placeholder="密码" autofocus>
      <div class="error" id="loginError"></div>
      <button class="btn btn-primary btn-block" id="loginBtn">登 录</button>
    </div>
  </div>

  <!-- ========== 顶部栏 ========== -->
  <div class="admin-header" id="adminHeader" style="display:none">
    <h1>🐺 个人主页 · 后台管理</h1>
    <div class="actions">
      <span class="status ok" id="saveStatus"></span>
      <button class="btn btn-outline btn-sm" onclick="window.open('/index.html','_blank')">预览站点 ↗</button>
      <button class="btn btn-primary" id="saveBtn" onclick="save()">💾 保存全部</button>
    </div>
  </div>

  <!-- ========== 编辑区 ========== -->
  <div class="container" id="editorContainer" style="display:none">

    <!-- 头像卡片 -->
    <div class="section">
      <h2><span class="icon">🃏</span> 头像卡片</h2>
      <div class="field-row">
        <div class="field">
          <label>头像图片</label>
          <div class="avatar-upload">
            <img class="avatar-upload-preview" id="avatarPreview" src="" alt="头像预览">
            <div class="avatar-upload-actions">
              <button class="btn btn-primary btn-sm" id="avatarUploadBtn">📷 上传新头像</button>
              <input type="file" id="avatarFileInput" accept="image/*" style="display:none">
              <input type="text" data-path="avatar.image" placeholder="/files/avatar-preview.jpg" id="avatarPathInput">
              <div class="field-hint">可上传新图，或点击下方已有图片快速选择</div>
            </div>
          </div>
          <div class="thumb-picker" id="avatarThumbPicker"></div>
        </div>
        <div class="field">
          <label>小标题 (Kicker)</label>
          <input type="text" data-path="avatar.kicker">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>名字 (Title)</label>
          <input type="text" data-path="avatar.title">
        </div>
        <div class="field">
          <label>个性签名 (Quote)</label>
          <input type="text" data-path="avatar.quote">
        </div>
      </div>
      <div class="field">
        <label>正面提示文字</label>
        <input type="text" data-path="avatar.frontHint">
      </div>
      <div class="field">
        <label>背面标题</label>
        <input type="text" data-path="avatar.backTitle">
      </div>
      <div class="field">
        <label>背面简介</label>
        <textarea data-path="avatar.backDescription"></textarea>
      </div>
      <div class="field">
        <label>背面提示文字</label>
        <input type="text" data-path="avatar.backHint">
      </div>
      <div class="field">
        <label>标签</label>
        <div class="tag-list" id="tagList"></div>
        <div style="display:flex; gap:8px; margin-top:8px;">
          <input type="text" id="newTagLabel" placeholder="新标签文字" style="flex:1">
          <select id="newTagStyle" style="width:120px">
            <option value="">默认样式</option>
            <option value="red">红色</option>
            <option value="blue">蓝色</option>
          </select>
          <button class="btn btn-primary btn-sm" onclick="addTag()">+ 添加</button>
        </div>
      </div>
    </div>

    <!-- 稿件管理 -->
    <div class="section">
      <h2><span class="icon">🖼️</span> 稿件管理</h2>
      <div class="artwork-list" id="artworkList"></div>
      <button class="btn btn-primary" style="margin-top:12px" onclick="addArtwork()">+ 添加稿件</button>
      <div class="upload-zone" id="uploadZone" style="margin-top:16px">
        <div class="label">📤 上传图片（拖拽或点击）</div>
        <div class="hint">支持 JPG / PNG / WebP，上传后点击缩略图可复制路径</div>
        <input type="file" id="fileInput" accept="image/*" multiple>
      </div>
      <div class="preview-row" id="previewRow"></div>
    </div>

    <!-- 联系方式 -->
    <div class="section">
      <h2><span class="icon">🔗</span> 联系方式</h2>
      <div class="field-row">
        <div class="field">
          <label>QQ 链接</label>
          <input type="text" data-path="contact.qq.url">
        </div>
        <div class="field">
          <label>QQ 标签</label>
          <input type="text" data-path="contact.qq.label">
        </div>
      </div>
      <div class="field">
        <label>QQ 描述</label>
        <input type="text" data-path="contact.qq.desc">
      </div>
      <div class="field-row" style="margin-top:14px">
        <div class="field">
          <label>Bilibili 链接</label>
          <input type="text" data-path="contact.bilibili.url">
        </div>
        <div class="field">
          <label>Bilibili 标签</label>
          <input type="text" data-path="contact.bilibili.label">
        </div>
      </div>
      <div class="field">
        <label>Bilibili 描述</label>
        <input type="text" data-path="contact.bilibili.desc">
      </div>
    </div>

    <!-- 页面文案 -->
    <div class="section">
      <h2><span class="icon">📝</span> 页面文案</h2>
      <div class="field">
        <label>顶部提示</label>
        <input type="text" data-path="texts.topNote">
      </div>
      <div class="field-row">
        <div class="field">
          <label>分隔文字 1</label>
          <input type="text" data-path="texts.spacer1">
        </div>
        <div class="field">
          <label>分隔文字 2</label>
          <input type="text" data-path="texts.spacer2">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>稿件区标题</label>
          <input type="text" data-path="texts.showcaseTitle">
        </div>
        <div class="field">
          <label>稿件区描述</label>
          <input type="text" data-path="texts.showcaseDesc">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>版权提示</label>
          <input type="text" data-path="texts.protectedNote">
        </div>
        <div class="field">
          <label>关闭提示</label>
          <input type="text" data-path="texts.closeHint">
        </div>
      </div>
      <div class="field">
        <label>水印文字</label>
        <input type="text" data-path="texts.modalWatermark">
      </div>
    </div>

  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ========== 状态 ==========
    let siteData = null;
    let uploadedImages = [];

    // ========== 登录 ==========
    const loginOverlay = document.getElementById('loginOverlay');
    const passwordInput = document.getElementById('passwordInput');
    const loginError = document.getElementById('loginError');
    const loginBtn = document.getElementById('loginBtn');

    async function checkAuth() {
      try { const res = await fetch('/api/check-auth'); return (await res.json()).authenticated; }
      catch { return false; }
    }

    async function login() {
      const password = passwordInput.value;
      loginBtn.disabled = true;
      loginError.textContent = '';
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        const data = await res.json();
        if (data.ok) {
          document.cookie = `admin_token=${data.token}; path=/; samesite=strict`;
          loginOverlay.classList.add('hidden');
          await initEditor();
        } else {
          loginError.textContent = data.error || '密码错误';
        }
      } catch {
        loginError.textContent = '连接失败，请确认服务器已启动';
      }
      loginBtn.disabled = false;
    }

    loginBtn.addEventListener('click', login);
    passwordInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') login(); });

    // ========== 初始化 ==========
    async function initEditor() {
      document.getElementById('adminHeader').style.display = 'flex';
      document.getElementById('editorContainer').style.display = 'block';
      try {
        const res = await fetch('/api/site');
        siteData = JSON.parse(JSON.stringify(await res.json()));
        populateForm();
        updateAvatarPreview();
        renderTags();
        renderArtworkList();
        loadExistingImages();
        // 头像专用上传按钮
        bindAvatarUpload();
      } catch (err) {
        showToast('加载数据失败: ' + err.message, 'error');
      }
    }

    function populateForm() {
      document.querySelectorAll('[data-path]').forEach(el => {
        const val = getByPath(siteData, el.dataset.path);
        if (val !== undefined && val !== null) {
          if (el.tagName === 'TEXTAREA' || el.tagName === 'INPUT') el.value = val;
        }
      });
    }

    function getByPath(obj, path) {
      return path.split('.').reduce((o, k) => (o || {})[k], obj);
    }

    function setByPath(obj, path, value) {
      const keys = path.split('.');
      const last = keys.pop();
      const target = keys.reduce((o, k) => { if (!o[k] || typeof o[k] !== 'object') o[k] = {}; return o[k]; }, obj);
      target[last] = value;
    }

    function collectFormData() {
      const data = JSON.parse(JSON.stringify(siteData));
      document.querySelectorAll('[data-path]').forEach(el => {
        if (el.tagName === 'TEXTAREA' || el.tagName === 'INPUT') {
          setByPath(data, el.dataset.path, el.value);
        }
      });
      return data;
    }

    // ========== 头像上传 ==========
    function updateAvatarPreview() {
      const path = document.getElementById('avatarPathInput').value || siteData?.avatar?.image || '';
      const preview = document.getElementById('avatarPreview');
      preview.src = path;
      preview.style.opacity = path ? '1' : '0';
      renderAvatarThumbPicker();
    }

    function renderAvatarThumbPicker() {
      const picker = document.getElementById('avatarThumbPicker');
      const currentPath = document.getElementById('avatarPathInput').value;
      picker.innerHTML = uploadedImages.map(img => `
        <img src="${escapeHTML(img)}"
             class="${img === currentPath ? 'active' : ''}"
             onclick="setAvatarPath('${escapeHTML(img)}')"
             title="${escapeHTML(img)}"
             onerror="this.style.display='none'">
      `).join('');
    }

    function setAvatarPath(path) {
      document.getElementById('avatarPathInput').value = path;
      updateAvatarPreview();
    }

    function bindAvatarUpload() {
      const btn = document.getElementById('avatarUploadBtn');
      const input = document.getElementById('avatarFileInput');
      btn.addEventListener('click', () => input.click());
      input.addEventListener('change', async () => {
        const file = input.files[0];
        if (!file || !file.type.startsWith('image/')) return;
        const base64 = await fileToBase64(file);
        try {
          const res = await fetch('/api/upload', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ filename: 'avatar-' + file.name, data: base64 })
          });
          const data = await res.json();
          if (data.ok) {
            uploadedImages.push(data.path);
            setAvatarPath(data.path);
            renderPreviewRow();
            showToast('头像上传成功！', 'success');
          } else {
            showToast('上传失败: ' + (data.error || '未知错误'), 'error');
          }
        } catch (err) {
          showToast('上传失败: ' + err.message, 'error');
        }
      });

      // 监听文本框变化，同步预览
      document.getElementById('avatarPathInput').addEventListener('input', updateAvatarPreview);
    }

    // ========== 标签 ==========
    function renderTags() {
      const container = document.getElementById('tagList');
      const tags = siteData.avatar.tags || [];
      container.innerHTML = tags.map((t, i) => `
        <span class="tag-item${t.style ? ' ' + t.style : ''}">
          ${escapeHTML(t.label)}
          <button onclick="removeTag(${i})" title="删除">×</button>
        </span>
      `).join('');
    }

    function addTag() {
      const label = document.getElementById('newTagLabel').value.trim();
      if (!label) return;
      if (!siteData.avatar.tags) siteData.avatar.tags = [];
      siteData.avatar.tags.push({ label, style: document.getElementById('newTagStyle').value });
      document.getElementById('newTagLabel').value = '';
      renderTags();
    }

    function removeTag(index) { siteData.avatar.tags.splice(index, 1); renderTags(); }

    // ========== 稿件 ==========
    function renderArtworkList() {
      const container = document.getElementById('artworkList');
      const artworks = siteData.artworks || [];
      container.innerHTML = artworks.map((art, i) => `
        <div class="artwork-item">
          <img src="${escapeHTML(art.image)}" alt="${escapeHTML(art.title)}" onclick="copyPath('${escapeHTML(art.image)}')" title="点击复制路径" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2280%22 height=%2280%22><rect fill=%22%23ddd%22 width=%2280%22 height=%2280%22/><text x=%2222%22 y=%2246%22 fill=%22%23999%22 font-size=%2212%22>无图片</text></svg>'">
          <div class="info">
            <input type="text" value="${escapeHTML(art.title)}" data-art-index="${i}" data-field="title" placeholder="稿件标题">
            <input type="text" value="${escapeHTML(art.image)}" data-art-index="${i}" data-field="image" placeholder="图片路径" style="margin-top:4px; font-size:12px; color:#536072">
          </div>
          <div class="actions">
            ${i > 0 ? `<button class="btn btn-outline btn-sm" onclick="moveArtwork(${i}, -1)">↑</button>` : ''}
            ${i < artworks.length - 1 ? `<button class="btn btn-outline btn-sm" onclick="moveArtwork(${i}, 1)">↓</button>` : ''}
            <button class="btn btn-danger btn-sm" onclick="removeArtwork(${i})">删除</button>
          </div>
        </div>
      `).join('');
    }

    function collectArtworkData() {
      const artworks = [];
      document.querySelectorAll('[data-art-index]').forEach(el => {
        const idx = parseInt(el.dataset.artIndex);
        const field = el.dataset.field;
        if (!artworks[idx]) artworks[idx] = { id: idx + 1, title: '', image: '' };
        artworks[idx][field] = el.value;
      });
      return artworks.filter(Boolean);
    }

    function addArtwork() {
      if (!siteData.artworks) siteData.artworks = [];
      const id = Math.max(0, ...siteData.artworks.map(a => a.id)) + 1;
      siteData.artworks.push({ id, title: '新稿件', image: '/files/artwork-01.png' });
      renderArtworkList();
    }

    function removeArtwork(index) {
      if (!confirm('确定删除这个稿件？')) return;
      siteData.artworks.splice(index, 1);
      renderArtworkList();
    }

    function moveArtwork(index, direction) {
      const arr = siteData.artworks;
      const newIndex = index + direction;
      if (newIndex < 0 || newIndex >= arr.length) return;
      [arr[index], arr[newIndex]] = [arr[newIndex], arr[index]];
      renderArtworkList();
    }

    function copyPath(p) {
      navigator.clipboard.writeText(p).then(() => showToast('路径已复制: ' + p, 'success'));
    }

    // ========== 通用上传区 ==========
    function loadExistingImages() {
      const seen = new Set();
      uploadedImages = [];
      (siteData.artworks || []).forEach(a => {
        if (a.image && !seen.has(a.image)) { seen.add(a.image); uploadedImages.push(a.image); }
      });
      if (siteData.avatar?.image && !seen.has(siteData.avatar.image)) {
        uploadedImages.push(siteData.avatar.image);
      }
      renderPreviewRow();
      renderAvatarThumbPicker();
    }

    function renderPreviewRow() {
      document.getElementById('previewRow').innerHTML = uploadedImages.map(img =>
        `<img class="thumb" src="${escapeHTML(img)}" onclick="copyPath('${escapeHTML(img)}')" title="点击复制路径 — 也可在头像区快速选择" onerror="this.style.display='none'">`
      ).join('');
    }

    const uploadZone = document.getElementById('uploadZone');
    const fileInput = document.getElementById('fileInput');
    uploadZone.addEventListener('click', () => fileInput.click());
    uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
    uploadZone.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadZone.classList.remove('drag-over');
      handleFiles(e.dataTransfer.files);
    });
    fileInput.addEventListener('change', () => handleFiles(fileInput.files));

    async function handleFiles(files) {
      for (const file of files) {
        if (!file.type.startsWith('image/')) continue;
        const base64 = await fileToBase64(file);
        try {
          const res = await fetch('/api/upload', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ filename: file.name, data: base64 })
          });
          const data = await res.json();
          if (data.ok) {
            uploadedImages.push(data.path);
            renderPreviewRow();
            renderAvatarThumbPicker();
            showToast('上传成功: ' + file.name, 'success');
          } else {
            showToast('上传失败: ' + (data.error || '未知错误'), 'error');
          }
        } catch (err) {
          showToast('上传失败: ' + err.message, 'error');
        }
      }
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // ========== 保存 ==========
    async function save() {
      const saveBtn = document.getElementById('saveBtn');
      const saveStatus = document.getElementById('saveStatus');
      saveBtn.disabled = true;
      saveStatus.textContent = '⏳ 保存中…';
      saveStatus.className = 'status';

      const data = collectFormData();
      data.artworks = collectArtworkData();

      try {
        const res = await fetch('/api/site', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        const result = await res.json();
        if (result.ok) {
          siteData = data;
          showToast('✅ 保存成功！刷新预览站点即可看到最新内容', 'success');
          saveStatus.textContent = '✅ 已保存';
          saveStatus.className = 'status ok';
        } else {
          showToast('保存失败: ' + (result.error || '未知错误'), 'error');
          saveStatus.textContent = '❌ 失败';
          saveStatus.className = 'status err';
        }
      } catch (err) {
        showToast('保存失败: ' + err.message, 'error');
        saveStatus.textContent = '❌ 连接失败';
        saveStatus.className = 'status err';
      }
      saveBtn.disabled = false;
    }

    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        if (!loginOverlay.classList.contains('hidden')) save();
      }
    });

    // ========== Toast ==========
    function showToast(message, type) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast ${type} show`;
      clearTimeout(toast._timer);
      toast._timer = setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function escapeHTML(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ========== 启动 ==========
    (async () => {
      const authed = await checkAuth();
      if (authed) {
        loginOverlay.classList.add('hidden');
        await initEditor();
      } else {
        loginOverlay.classList.remove('hidden');
        passwordInput.focus();
      }
    })();
  </script>
</body>
</html>
