<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>驳川小站</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 230vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #27303b;
      background: #c7cbd1;
      overflow-x: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,.22);
      pointer-events: none;
    }
    body.modal-open { overflow: hidden; }
    .wrap {
      position: relative;
      width: min(980px, calc(100% - 32px));
      margin: 0 auto;
      padding: 44px 0 120px;
    }
    .note {
      margin: 0 0 22px;
      color: #3d4654;
      text-align: center;
      line-height: 1.7;
    }
    .stage { min-height: 84vh; display: grid; place-items: center; }
    .flip-card {
      width: min(620px, 100%);
      min-height: 620px;
      perspective: 1400px;
      cursor: pointer;
      border-radius: 36px;
      filter: drop-shadow(0 0 28px rgba(55,109,255,.24)) drop-shadow(0 0 34px rgba(220,32,49,.18));
    }
    .flip-inner {
      position: relative;
      display: block;
      width: 100%;
      min-height: 620px;
      transform-style: preserve-3d;
      transition: transform .9s cubic-bezier(.16, 1, .3, 1);
    }
    .flip-card.is-flipped .flip-inner { transform: rotateY(180deg); }
    .face, .glass-section, .link-card {
      border: 1px solid rgba(255,255,255,.62);
      background: rgba(230,233,238,.5);
      backdrop-filter: blur(24px) saturate(120%);
      -webkit-backdrop-filter: blur(24px) saturate(120%);
      box-shadow: 0 30px 90px rgba(74,83,96,.24), 0 0 26px rgba(55,109,255,.13), 0 0 34px rgba(220,32,49,.1), inset 0 1px 0 rgba(255,255,255,.8), inset 0 -1px 0 rgba(255,255,255,.22);
    }
    .face {
      position: absolute;
      inset: 0;
      min-height: 620px;
      overflow: hidden;
      display: grid;
      place-items: center;
      padding: 44px;
      border-radius: 36px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }
    .face.back { transform: rotateY(180deg); }
    .sweep {
      position: absolute;
      inset: -40% -75%;
      transform: translateX(-62%) rotate(18deg);
      background: linear-gradient(90deg, transparent 43%, rgba(255,255,255,.72), rgba(255,255,255,.2), transparent 58%);
      opacity: 0;
      pointer-events: none;
      z-index: 2;
    }
    .flip-card.sweep-on .sweep { animation: sweepOnce .82s cubic-bezier(.16, 1, .3, 1); }
    @keyframes sweepOnce {
      0% { transform: translateX(-62%) rotate(18deg); opacity: 0; }
      20% { opacity: .9; }
      100% { transform: translateX(62%) rotate(18deg); opacity: 0; }
    }
    .content { position: relative; z-index: 3; width: 100%; text-align: center; }
    .avatar {
      display: block;
      width: 220px;
      height: 220px;
      margin: 0 auto 22px;
      padding: 6px;
      border-radius: 50%;
      background: #3b72ff;
      box-shadow: 0 0 0 4px #dc2031, 0 0 0 12px rgba(255,255,255,.42), 0 20px 58px rgba(68,77,91,.28);
    }
    .avatar img { width: 100%; height: 100%; display: block; object-fit: cover; border-radius: 50%; }
    .kicker { color: #355da8; font-size: 12px; letter-spacing: .2em; text-transform: uppercase; }
    h1 { margin: 12px 0; font-size: clamp(40px, 6vw, 64px); line-height: 1.04; letter-spacing: 0; color: #202833; }
    .quote, .hint { margin: 0; color: #384454; font-size: 17px; line-height: 1.7; }
    .hint { margin-top: 22px; color: #536072; font-size: 14px; }
    .contact-row { display: flex; gap: 12px; justify-content: center; margin-top: 18px; }
    .cta-icon {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 999px;
      background: rgba(255,255,255,.55);
      border: 1px solid rgba(255,255,255,.7);
      color: #27303b; text-decoration: none; font-size: 13px;
      transition: transform .2s ease, background .2s ease, box-shadow .2s ease;
    }
    .cta-icon:hover { transform: translateY(-2px); background: rgba(255,255,255,.8); box-shadow: 0 4px 16px rgba(55,109,255,.15); }
    .cta-icon.qq:hover { box-shadow: 0 4px 16px rgba(18,183,245,.25); }
    .cta-icon.bili:hover { box-shadow: 0 4px 16px rgba(251,114,153,.25); }
    .cta-icon span { font-weight: 500; }
    .back .content { max-width: 500px; margin: 0 auto; text-align: left; }
    .back h2, .glass-section h2 { margin: 0 0 18px; font-size: clamp(30px, 5vw, 46px); letter-spacing: 0; color: #202833; }
    .back p, .glass-section p { margin: 0; color: #344051; font-size: clamp(16px, 2vw, 20px); line-height: 1.95; }
    .tags { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 26px; }
    .tag { border-radius: 999px; padding: 8px 12px; border: 1px solid rgba(71,82,99,.18); background: rgba(255,255,255,.38); color: #344051; font-size: 13px; }
    .tag.red { border-color: rgba(220,32,49,.48); background: rgba(220,32,49,.14); }
    .tag.blue { border-color: rgba(55,109,255,.5); background: rgba(55,109,255,.15); }
    .spacer { min-height: 18vh; display: grid; place-items: center; color: #3d4654; text-align: center; }
    .glass-section {
      position: relative;
      overflow: hidden;
      border-radius: 34px;
      padding: clamp(28px, 5vw, 48px);
      transform: translateY(130px) scale(.95);
      opacity: 0;
      transition: transform 1s cubic-bezier(.16,1,.3,1), opacity 1s cubic-bezier(.16,1,.3,1);
    }
    .glass-section.is-visible, .contact.is-visible { transform: translateY(0) scale(1); opacity: 1; }
    .stack-area {
      position: relative;
      z-index: 2;
      min-height: 580px;
      margin-top: 28px;
      padding-bottom: clamp(72px, 8vw, 112px);
      user-select: none;
      -webkit-user-select: none;
    }
    .art-stack {
      position: relative;
      width: min(480px, 84vw);
      height: 480px;
      margin: 0 auto;
    }
    .art-card {
      --stack-x: 0px;
      --stack-y: 0px;
      --stack-rotate: 0deg;
      --stack-scale: 1;
      --stack-z: 1;
      position: absolute;
      inset: 0;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.6);
      border-radius: 28px;
      background: rgba(255,255,255,.38);
      box-shadow:
        0 24px 58px rgba(74,83,96,.2),
        0 0 30px rgba(55,109,255,.14),
        0 0 34px rgba(220,32,49,.08),
        inset 0 1px 0 rgba(255,255,255,.72);
      cursor: pointer;
      transform: translate(var(--stack-x), var(--stack-y)) rotate(var(--stack-rotate)) scale(var(--stack-scale));
      z-index: var(--stack-z);
      transition:
        transform .75s cubic-bezier(.16, 1, .3, 1),
        box-shadow .4s ease,
        filter .4s ease;
    }
    .art-card.is-front { cursor: zoom-in; }
    .art-card:hover {
      box-shadow:
        0 30px 70px rgba(74,83,96,.28),
        0 0 44px rgba(55,109,255,.28),
        0 0 48px rgba(220,32,49,.2),
        inset 0 1px 0 rgba(255,255,255,.8);
      z-index: 20 !important;
      filter: brightness(1.05);
    }
    .art-card img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      pointer-events: none;
      -webkit-user-drag: none;
      user-select: none;
    }
    .art-overlay {
      position: absolute;
      inset: 0;
      z-index: 3;
      background: linear-gradient(180deg, transparent 70%, rgba(32,40,51,.18));
    }
    .watermark {
      position: absolute;
      right: 14px;
      bottom: 12px;
      z-index: 4;
      color: rgba(255,255,255,.86);
      text-shadow: 0 1px 8px rgba(32,40,51,.45);
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
      pointer-events: none;
    }
    .glass-section .protected-note {
      position: relative;
      z-index: 2;
      margin: clamp(68px, 8vw, 96px) auto 0;
      max-width: 620px;
      font-size: 14px;
      color: #536072;
      text-align: center;
    }
    .modal {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(46, 52, 62, 0);
      backdrop-filter: blur(0);
      -webkit-backdrop-filter: blur(0);
      opacity: 0;
      pointer-events: none;
      transition:
        opacity .42s cubic-bezier(.16, 1, .3, 1),
        background .42s cubic-bezier(.16, 1, .3, 1),
        backdrop-filter .42s cubic-bezier(.16, 1, .3, 1);
    }
    .modal.is-open {
      background: rgba(46, 52, 62, .42);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      opacity: 1;
      pointer-events: auto;
    }
    .modal-card {
      position: relative;
      width: min(760px, 92vw);
      max-height: 86vh;
      transform: translateY(46px) scale(.86);
      opacity: 0;
      transition:
        transform .62s cubic-bezier(.16, 1, .3, 1),
        opacity .42s cubic-bezier(.16, 1, .3, 1);
    }
    .modal.is-open .modal-card {
      transform: translateY(0) scale(1);
      opacity: 1;
    }
    .modal-card img {
      width: 100%;
      max-height: 86vh;
      display: block;
      object-fit: contain;
      border-radius: 28px;
      box-shadow: 0 30px 90px rgba(38,46,58,.45), 0 0 42px rgba(55,109,255,.24), 0 0 52px rgba(220,32,49,.18);
      pointer-events: none;
      -webkit-user-drag: none;
      user-select: none;
    }
    .modal-card::after {
      content: "Preview Only";
      position: absolute;
      right: 18px;
      bottom: 16px;
      color: rgba(255,255,255,.82);
      text-shadow: 0 1px 10px rgba(20,24,30,.6);
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .close-hint {
      position: fixed;
      top: 20px;
      right: 24px;
      z-index: 101;
      color: #f7f8fb;
      font-size: 14px;
      opacity: 0;
      transition: opacity .25s ease;
      pointer-events: none;
    }
    .modal.is-open + .close-hint { opacity: .9; }
    .contact { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; transform: translateY(130px) scale(.95); opacity: 0; transition: transform 1s cubic-bezier(.16,1,.3,1), opacity 1s cubic-bezier(.16,1,.3,1); }
    .link-card { color: #27303b; text-decoration: none; padding: 24px; border-radius: 22px; transition: transform .35s cubic-bezier(.16,1,.3,1), background .22s ease; }
    .link-card:hover { transform: translateY(-6px); background: rgba(240,242,246,.66); }
    .link-card strong { display: block; margin-bottom: 8px; }
    .link-card span { color: #536072; }
    .art-stack:hover .art-card { transition: transform .65s cubic-bezier(.16, 1, .3, 1), box-shadow .35s ease, filter .35s ease; }
    @media (max-width: 700px) {
      .contact { grid-template-columns: 1fr; }
      .stack-area { min-height: 500px; }
      .art-stack { width: min(380px, 88vw); height: 420px; }
    }
    @media (max-width: 640px) {
      .wrap { width: min(100% - 24px, 980px); padding-top: 28px; }
      .flip-card, .flip-inner, .face { min-height: 600px; }
      .face { padding: 30px 22px; }
      .avatar { width: 170px; height: 170px; }
      .stack-area { min-height: 460px; }
      .art-stack { width: min(320px, 90vw); height: 370px; }
    }
    @media (prefers-reduced-motion: reduce) {
      .flip-inner, .glass-section, .contact, .link-card, .art-card, .modal, .modal-card { transition: none; }
      .glass-section, .contact { transform: none; opacity: 1; }
      .flip-card.sweep-on .sweep { animation: none; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <p class="note">欢迎来到驳川小站~</p>
    <section class="stage">
      <div class="flip-card" role="button" tabindex="0" aria-pressed="false" aria-label="翻转头像卡片查看简介">
        <div class="flip-inner">
          <div class="face front">
            <div class="sweep"></div>
            <div class="content">
              <div class="avatar"><img src="files/avatar-preview.jpg" alt="灰狼头像" draggable="false"></div>
              <div class="kicker">Wolf / High School Student</div>
              <h1>驳川</h1>
              <p class="quote">"别靠太近……算了，朋友的话可以。"</p>
              <p class="hint">点击卡片查看简介</p>
              <div class="contact-row">
                <a class="cta-icon qq" href="https://qm.qq.com/q/gTjB0YQ9TG" target="_blank" rel="noreferrer" title="加我好友">
                  <svg viewBox="0 0 24 24" width="18" height="18"><circle cx="12" cy="12" r="11" fill="#12B7F5"/><text x="12" y="16" text-anchor="middle" fill="white" font-size="9" font-weight="bold" font-family="system-ui,sans-serif">QQ</text></svg>
                  <span>QQ</span>
                </a>
                <a class="cta-icon bili" href="https://b23.tv/XBYwzty" target="_blank" rel="noreferrer" title="我的空间">
                  <svg viewBox="0 0 24 24" width="18" height="18"><rect x="2" y="7" width="20" height="13" rx="3" fill="#FB7299"/><line x1="7" y1="7" x2="5" y2="2" stroke="#FB7299" stroke-width="2" stroke-linecap="round"/><line x1="17" y1="7" x2="19" y2="2" stroke="#FB7299" stroke-width="2" stroke-linecap="round"/><text x="12" y="17" text-anchor="middle" fill="white" font-size="7" font-weight="bold" font-family="system-ui,sans-serif">B站</text></svg>
                  <span>B站</span>
                </a>
              </div>
            </div>
          </div>
          <div class="face back">
            <div class="sweep"></div>
            <div class="content">
              <h2>关于我</h2>
              <p>我是一只狼，也是一个学习不太好的高中生。平时看起来有点冷，不太好接近，还喜欢打架，上课也经常困到睡着；不过熟了之后我其实很热情，对朋友会很认真。虽然我有时候很呆，但看到可爱的东西会忍不住多看几眼。</p>
              <div class="tags">
                <span class="tag">外冷内热</span>
                <span class="tag red">喜欢打架</span>
                <span class="tag blue">高中生</span>
              </div>
              <p class="hint">再点一次返回</p>
            </div>
          </div>
        </div>
      </div>
    </section>
    <div class="spacer"></div>
    <section class="glass-section reveal" id="showcase">
      <div class="content" style="text-align:left">
        <h2>我的稿件</h2>
        <p>点击最前的卡片放大查看，点击后面的换到前面</p>
        <div class="stack-area" oncontextmenu="return false">
          <div class="art-stack">
            <button class="art-card" type="button" data-index="0" data-art="files/artwork-01.png" aria-label="稿件 01">
              <img src="files/artwork-01.png" alt="稿件 01" draggable="false">
              <span class="art-overlay"></span>
              <span class="watermark">Preview Only</span>
            </button>
            <button class="art-card" type="button" data-index="1" data-art="files/artwork-02.png" aria-label="稿件 02">
              <img src="files/artwork-02.png" alt="稿件 02" draggable="false">
              <span class="art-overlay"></span>
              <span class="watermark">Preview Only</span>
            </button>
            <button class="art-card" type="button" data-index="2" data-art="files/avatar-preview.jpg" aria-label="稿件 03">
              <img src="files/avatar-preview.jpg" alt="新稿件" draggable="false">
              <span class="art-overlay"></span>
              <span class="watermark">Preview Only</span>
            </button>
          </div>
          <p class="protected-note">不要偷我图片，嗷呜......</p>
        </div>
      </div>
    </section>
  </main>
  <div class="modal" id="artModal" aria-hidden="true" oncontextmenu="return false">
    <div class="modal-card">
      <img id="modalImage" alt="放大的稿件预览" draggable="false">
    </div>
  </div>
  <div class="close-hint">点击空白处关闭</div>
  <script>
    const flipCard = document.querySelector('.flip-card');
    const toggleFlip = () => {
      const flipped = flipCard.classList.toggle('is-flipped');
      flipCard.setAttribute('aria-pressed', String(flipped));
      window.setTimeout(() => {
        flipCard.classList.remove('sweep-on');
        void flipCard.offsetWidth;
        flipCard.classList.add('sweep-on');
        window.setTimeout(() => flipCard.classList.remove('sweep-on'), 900);
      }, 520);
    };
    flipCard.addEventListener('click', toggleFlip);
    flipCard.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        toggleFlip();
      }
    });

    const modal = document.getElementById('artModal');
    const modalImage = document.getElementById('modalImage');
    const openModal = (src) => {
      modalImage.src = src;
      modal.setAttribute('aria-hidden', 'false');
      document.body.classList.add('modal-open');
      requestAnimationFrame(() => modal.classList.add('is-open'));
    };
    const closeModal = () => {
      modal.classList.remove('is-open');
      window.setTimeout(() => {
        modal.setAttribute('aria-hidden', 'true');
        modalImage.removeAttribute('src');
        document.body.classList.remove('modal-open');
      }, 420);
    };

    const artStack = document.querySelector('.art-stack');
    let artworkCards = [];

    const collectCards = () => {
      artworkCards = Array.from(artStack.querySelectorAll('.art-card'));
    };
    collectCards();

    const computeStackParams = (position, total, hover) => {
      const frontIdx = total - 1;
      const dist = frontIdx - position;
      const ratio = total > 1 ? dist / (total - 1) : 0;

      if (hover) {
        const x = 6 + ratio * (-72);
        const y = -4 + ratio * 32;
        const rot = 2.5 + ratio * (-14);
        const scl = 1 - ratio * 0.1;
        return { x, y, rot, scl };
      }
      const x = 2 + ratio * (-22);
      const y = -2 + ratio * 10;
      const rot = 1.5 + ratio * (-8);
      const scl = 1 - ratio * 0.08;
      return { x, y, rot, scl };
    };

    const applyStackParams = (hover) => {
      const total = artworkCards.length;
      artworkCards.forEach((card, i) => {
        const p = computeStackParams(i, total, hover);
        card.style.setProperty('--stack-x', p.x + 'px');
        card.style.setProperty('--stack-y', p.y + 'px');
        card.style.setProperty('--stack-rotate', p.rot + 'deg');
        card.style.setProperty('--stack-scale', String(p.scl));
        card.style.setProperty('--stack-z', String(i + 1));
        const isFront = i === total - 1;
        card.classList.toggle('is-front', isFront);
        card.setAttribute('aria-label', isFront ? '放大查看稿件 ' + String(i + 1).padStart(2, '0') : '将稿件 ' + String(i + 1).padStart(2, '0') + ' 移到最前');
      });
    };

    const bringToFront = (card) => {
      const total = artworkCards.length;
      const idx = artworkCards.indexOf(card);
      if (idx === -1 || idx === total - 1) return;
      artStack.appendChild(card);
      collectCards();
      applyStackParams(false);
    };

    applyStackParams(false);

    artStack.addEventListener('mouseenter', () => applyStackParams(true));
    artStack.addEventListener('mouseleave', () => applyStackParams(false));

    artStack.addEventListener('click', (e) => {
      const card = e.target.closest('.art-card');
      if (!card) return;
      const total = artworkCards.length;
      const idx = artworkCards.indexOf(card);
      if (idx === total - 1) {
        openModal(card.dataset.art);
        return;
      }
      bringToFront(card);
    });

    artStack.addEventListener('contextmenu', (event) => event.preventDefault());
    document.querySelectorAll('#showcase, #showcase *, #artModal, #artModal *').forEach((el) => {
      el.addEventListener('contextmenu', (event) => event.preventDefault());
      el.addEventListener('dragstart', (event) => event.preventDefault());
    });

    modal.addEventListener('click', closeModal);
    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && modal.classList.contains('is-open')) closeModal();
    });

    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) entry.target.classList.add('is-visible');
        else entry.target.classList.remove('is-visible');
      });
    }, { threshold: 0.25 });
    document.querySelectorAll('.reveal').forEach((el) => observer.observe(el));
  </script>
</body>
</html>
